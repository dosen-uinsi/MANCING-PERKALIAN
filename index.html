<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mancing Mania Perkalian</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff;
            margin: 0;
            flex-direction: column;
            padding: 20px 0;
        }

        .header-container {
            text-align: center;
            margin-bottom: 15px;
            padding: 0 20px;
        }

        .header-title {
            color: #1e3a8a;
            font-size: 28px;
            font-weight: bold;
            line-height: 1.2;
        }

        .subtitle {
            color: #ea580c;
            font-size: 16px;
            font-weight: bold;
            font-style: italic;
            margin-top: 5px;
        }

        .header-image {
            width: 100%;
            max-width: 320px;
            height: auto;
            margin-bottom: 20px;
        }

        .settings-container {
            display: flex;
            flex-direction: row;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
            background-color: #f0f9ff;
            padding: 10px 20px;
            border-radius: 15px;
            border: 2px solid #bae6fd;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .settings-container select {
            padding: 8px 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid #38bdf8;
            background-color: white;
            color: #0c4a6e;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            font-family: inherit;
        }

        .settings-container button {
            padding: 8px 15px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            background-color: #ea580c;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            font-family: inherit;
            box-shadow: 0 2px 4px rgba(234, 88, 12, 0.3);
        }

        .settings-container button:hover {
            background-color: #c2410c;
        }

        .game-board {
            width: 340px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            box-sizing: border-box;
        }

        .bubble-container {
            width: 80px;
            height: 80px;
            perspective: 1000px;
            cursor: pointer;
            justify-self: center;
        }

        .bubble {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 50%;
            box-shadow: 0 6px 12px rgba(14, 165, 233, 0.2);
        }

        .bubble.flipped {
            transform: rotateY(180deg);
            cursor: default;
            box-shadow: 0 6px 12px rgba(249, 115, 22, 0.2);
        }

        /* Efek khusus untuk ikan terakhir agar minta diklik */
        .bubble.clickable-fish {
            animation: pulse-fish 1s infinite alternate;
            cursor: pointer !important;
            z-index: 10;
        }

        @keyframes pulse-fish {
            0% { transform: rotateY(180deg) scale(1); box-shadow: 0 0 10px rgba(249, 115, 22, 0.5); }
            100% { transform: rotateY(180deg) scale(1.15); box-shadow: 0 0 25px rgba(249, 115, 22, 1); }
        }

        .bubble.error {
            animation: shake 0.4s;
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            font-size: 26px;
            font-weight: bold;
            box-sizing: border-box;
            color: #1e3a8a;
        }

        .front {
            background: radial-gradient(circle at 30% 30%, #ffffff, #bae6fd);
            box-shadow: inset -4px -4px 10px rgba(14, 165, 233, 0.3), inset 4px 4px 10px rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(14, 165, 233, 0.3);
        }

        .front::before, .back::before {
            content: '';
            position: absolute;
            top: 12%;
            left: 18%;
            width: 25%;
            height: 25%;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            filter: blur(1px);
        }

        .front.small-text {
            font-size: 18px;
        }

        .back {
            background: radial-gradient(circle at 30% 30%, #ffffff, #fed7aa);
            transform: rotateY(180deg);
            box-shadow: inset -4px -4px 10px rgba(234, 88, 12, 0.3), inset 4px 4px 10px rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(234, 88, 12, 0.3);
            color: #9a3412;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            50% { transform: translateX(6px); }
            75% { transform: translateX(-6px); }
        }

        #message-board {
            margin-top: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #1e3a8a;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.15);
            text-align: center;
            max-width: 400px;
            border: 2px dashed #7dd3fc;
        }

        .highlight {
            color: #ea580c;
            font-size: 26px;
        }

        /* --- DESAIN LAYAR REWARD IKAN --- */
        #reward-modal {
            display: none; /* Disembunyikan secara default */
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }

        .reward-container {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Efek cahaya berputar di belakang gambar */
        .light-rays {
            position: absolute;
            width: 350px;
            height: 350px;
            background: repeating-conic-gradient(from 0deg, rgba(253, 224, 71, 0.9) 0deg 15deg, transparent 15deg 30deg);
            border-radius: 50%;
            animation: spin 6s linear infinite;
            filter: blur(2px);
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* Desain bulat untuk GIF Ikan */
        .reward-image {
            position: relative;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid #ffffff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.8);
            z-index: 2;
        }

        .close-btn {
            margin-top: 40px;
            padding: 12px 30px;
            background: #ea580c;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            z-index: 2;
            box-shadow: 0 4px 10px rgba(234, 88, 12, 0.5);
        }

        .close-btn:hover {
            background: #c2410c;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="header-title">MANCING MANIA<br>PERKALIAN</div>
        <div class="subtitle">By Mathnology</div>
    </div>

    <img src="https://raw.githubusercontent.com/dosen-uinsi/MANCING-PERKALIAN/refs/heads/main/Mancing%20Mania.gif" alt="Mancing Mania" class="header-image">
    
    <div class="settings-container">
        <select id="multiplier-select">
            <option value="2">Perkalian 2</option>
            <option value="3">Perkalian 3</option>
            <option value="4">Perkalian 4</option>
            <option value="5">Perkalian 5</option>
            <option value="6">Perkalian 6</option>
            <option value="7">Perkalian 7</option>
            <option value="8">Perkalian 8</option>
            <option value="9">Perkalian 9</option>
        </select>
        <button id="start-btn">Mulai Ulang</button>
    </div>

    <div class="game-board" id="grid"></div>

    <div id="message-board">
        Pilih perkalian lalu klik tombol <span style="color: #ea580c;">"Mulai Ulang"</span>
    </div>

    <div id="reward-modal">
        <div class="reward-container">
            <div class="light-rays"></div>
            <img src="https://raw.githubusercontent.com/dosen-uinsi/MANCING-PERKALIAN/refs/heads/main/Ikan.gif" alt="Ikan Reward" class="reward-image">
        </div>
        <button class="close-btn" onclick="closeModal()">Tutup</button>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const messageBoard = document.getElementById('message-board');
        const multiplierSelect = document.getElementById('multiplier-select');
        const startBtn = document.getElementById('start-btn');
        const rewardModal = document.getElementById('reward-modal');
        let currentExpected = "Mulai"; 

        // Fungsi Menutup Modal Reward
        function closeModal() {
            rewardModal.style.display = 'none';
        }

        // Fungsi untuk mengacak array (Fisher-Yates Shuffle)
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // Fungsi untuk membuat data game
        function generateGameData(multiplier) {
            const sequence = [6, 8, 5, 3, 7, 4, 2, 9];
            let data = [];
            
            // Gelembung pertama
            data.push({ 
                front: "Mulai", 
                back: `${multiplier}x${sequence[0]}`, 
                requires: "Mulai", 
                nextExpected: (multiplier * sequence[0]).toString() 
            });
            
            // Gelembung kedua sampai ke-delapan
            for(let i = 0; i < sequence.length - 1; i++) {
                let currentRes = multiplier * sequence[i];
                let nextMulti = sequence[i+1];
                data.push({
                    front: currentRes.toString(),
                    back: `${multiplier}x${nextMulti}`,
                    requires: currentRes.toString(),
                    nextExpected: (multiplier * nextMulti).toString()
                });
            }
            
            // Gelembung terakhir
            let lastRes = multiplier * sequence[sequence.length - 1];
            data.push({
                front: lastRes.toString(),
                back: "🐟",
                requires: lastRes.toString(),
                nextExpected: "selesai"
            });
            
            return data;
        }

        // Fungsi utama untuk memulai / mereset permainan
        function startGame() {
            grid.innerHTML = '';
            currentExpected = "Mulai";
            messageBoard.innerHTML = `Klik gelembung <span style="color: #0284c7;">"Mulai"</span> untuk memancing!`;
            rewardModal.style.display = 'none'; // Sembunyikan modal jika masih terbuka

            const selectedMultiplier = parseInt(multiplierSelect.value);
            const gameData = generateGameData(selectedMultiplier);
            const shuffledTiles = shuffle([...gameData]);

            shuffledTiles.forEach(data => {
                const container = document.createElement('div');
                container.className = 'bubble-container';
                
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.dataset.requires = data.requires;
                bubble.dataset.next = data.nextExpected;
                
                const front = document.createElement('div');
                front.className = 'face front';
                if(data.front === "Mulai") front.classList.add('small-text');
                front.innerText = data.front;
                
                const back = document.createElement('div');
                back.className = 'face back';
                back.innerText = data.back;
                
                bubble.appendChild(front);
                bubble.appendChild(back);
                container.appendChild(bubble);
                grid.appendChild(container);

                container.addEventListener('click', () => {
                    // Jika sudah dibalik dan merupakan ikan terakhir (yang punya efek klik)
                    if(bubble.classList.contains('flipped')) {
                        if(bubble.classList.contains('clickable-fish')) {
                            // Tampilkan modal ikan
                            rewardModal.style.display = 'flex';
                        }
                        return;
                    }

                    if(bubble.dataset.requires === currentExpected) {
                        bubble.classList.add('flipped');
                        currentExpected = bubble.dataset.next; 
                        
                        if(currentExpected === "selesai") {
                            // Tambahkan kelas untuk efek denyut pada ikan terakhir
                            bubble.classList.add('clickable-fish');
                            messageBoard.innerHTML = "<span style='color: #ea580c;'>Yey kamu dapat ikan!!!</span>";
                        } else {
                            messageBoard.innerHTML = `Berapa hasil dari <br> <span class="highlight">${data.back}</span> ?`;
                        }
                    } else {
                        bubble.classList.add('error');
                        setTimeout(() => {
                            bubble.classList.remove('error');
                        }, 400); 
                    }
                });
            });
        }

        startBtn.addEventListener('click', startGame);

        // Render otomatis saat pertama kali dibuka
        startGame();
    </script>
</body>
</html>
